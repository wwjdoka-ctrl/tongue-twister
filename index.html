<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#7F77DD">
<title>Tongue Twister Practice</title>
<link rel="manifest" href="manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f0f8;color:#1a1a1a;min-height:100vh}
.page{display:none;min-height:100vh;padding-bottom:60px}
.page.on{display:block}
.bar{background:#7F77DD;color:#fff;padding:14px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:9}
.bar h1{font-size:18px;font-weight:600;flex:1}
.back{background:rgba(255,255,255,.25);border:none;color:#fff;width:34px;height:34px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.body{padding:16px}
.card{background:#fff;border-radius:12px;border:1px solid rgba(0,0,0,.1);padding:16px;margin-bottom:12px}
button.big{width:100%;padding:14px;border-radius:10px;border:2px solid #7F77DD;background:#EEEDFE;color:#3C3489;font-size:16px;font-weight:600;cursor:pointer;margin-bottom:10px}
button.big:active{opacity:.8}
button.go{background:#7F77DD;border-color:#7F77DD;color:#fff}
button.red{background:#E24B4A;border-color:#E24B4A;color:#fff}
button.green{background:#639922;border-color:#639922;color:#fff}
button.small{padding:10px 16px;border-radius:8px;border:1.5px solid rgba(0,0,0,.15);background:#fff;font-size:14px;cursor:pointer;margin-right:8px;margin-bottom:8px}
label{display:block;font-size:13px;color:#666;margin-bottom:5px;margin-top:12px}
input[type=text],input[type=number]{width:100%;padding:12px;border-radius:8px;border:1.5px solid rgba(0,0,0,.2);font-size:16px;background:#fff;color:#1a1a1a}
input:focus{outline:none;border-color:#7F77DD}
.colors{display:flex;gap:10px;margin-top:8px;flex-wrap:wrap}
.dot{width:36px;height:36px;border-radius:50%;cursor:pointer;border:3px solid transparent}
.dot.sel{border-color:#3C3489}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.pcard{background:#fff;border-radius:12px;border:1px solid rgba(0,0,0,.1);padding:14px;cursor:pointer}
.pcard:active{border-color:#7F77DD}
.av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;margin-bottom:8px}
.pname{font-size:15px;font-weight:600}
.page{font-size:12px;color:#888}
.stats{display:flex;gap:8px;margin-top:8px}
.st{flex:1;background:#f5f5f5;border-radius:8px;padding:8px;text-align:center}
.sv{font-size:16px;font-weight:700;color:#7F77DD}
.sl{font-size:10px;color:#888;text-transform:uppercase}
.stat3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.s3{background:#f5f5f5;border-radius:8px;padding:12px;text-align:center}
.s3v{font-size:22px;font-weight:700;color:#7F77DD}
.s3l{font-size:11px;color:#888;text-transform:uppercase}
.pbg{background:#e0e0e0;border-radius:99px;height:10px;overflow:hidden;margin-bottom:14px}
.pfill{height:100%;background:#7F77DD;border-radius:99px;transition:width .4s}
.tabs{display:flex;border-bottom:2px solid #e0e0e0;margin-bottom:14px}
.tab{flex:1;padding:10px;text-align:center;font-size:14px;font-weight:500;cursor:pointer;color:#888;border-bottom:3px solid transparent;margin-bottom:-2px}
.tab.on{color:#7F77DD;border-bottom-color:#7F77DD}
.chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:6px 14px;border-radius:99px;border:1.5px solid rgba(0,0,0,.15);background:#fff;font-size:13px;cursor:pointer}
.chip.on{background:#7F77DD;border-color:#7F77DD;color:#fff}
.titem{background:#fff;border-radius:10px;border:1px solid rgba(0,0,0,.1);padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:10px;cursor:pointer}
.titem:active{border-color:#7F77DD}
.circle{width:24px;height:24px;border-radius:50%;border:2px solid #ccc;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.circle.done{background:#EAF3DE;border-color:#639922;color:#27500A}
.tinfo{flex:1;min-width:0}
.tt{font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tip{font-size:12px;color:#888;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.badge{display:inline-block;font-size:11px;font-weight:600;padding:3px 8px;border-radius:99px;text-transform:uppercase}
.easy{background:#EAF3DE;color:#27500A}
.medium{background:#FAEEDA;color:#633806}
.hard{background:#FCEBEB;color:#791F1F}
.ptext{font-size:20px;font-weight:700;line-height:1.5;margin-bottom:8px}
.ptip{font-size:13px;color:#666}
.wave{display:flex;align-items:center;justify-content:center;gap:4px;height:48px;background:#f5f5f5;border-radius:8px;margin-bottom:12px}
.wave span{display:block;width:5px;background:#7F77DD;border-radius:3px;opacity:.7}
.rdot{width:12px;height:12px;border-radius:50%;background:#888;display:inline-block;margin-right:6px}
.rdot.rec{background:#E24B4A;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.fbox{background:#EEEDFE;border-radius:8px;padding:14px;font-size:14px;line-height:1.6;margin-bottom:12px}
.spill{display:inline-block;background:#7F77DD;color:#fff;font-size:14px;font-weight:700;padding:5px 14px;border-radius:99px;margin-top:6px}
.hitem{background:#fff;border-radius:10px;border:1px solid rgba(0,0,0,.1);padding:12px;margin-bottom:8px}
.hrow{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.hdate{font-size:11px;color:#aaa}
.htext{font-size:14px;margin-bottom:4px}
.hfeed{font-size:13px;color:#666;line-height:1.5}
.empty{text-align:center;padding:40px 20px;color:#aaa;font-size:15px}
.srow{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.srow label{font-size:13px;color:#666;white-space:nowrap;min-width:44px}
.srow input[type=range]{flex:1;accent-color:#7F77DD}
.srow span{font-size:13px;font-weight:600;color:#7F77DD;min-width:44px}
.secl{font-size:12px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin:4px 0 10px}
</style>
</head>
<body>

<!-- HOME -->
<div class="page on" id="p-home">
  <div class="bar"><h1>🗣️ Tongue Twister</h1></div>
  <div class="body">
    <p class="secl">Players</p>
    <div class="pgrid" id="pgrid"><div class="empty">No players yet</div></div>
    <button class="big" onclick="show('p-add')">+ Add player</button>
  </div>
</div>

<!-- ADD PLAYER -->
<div class="page" id="p-add">
  <div class="bar">
    <button class="back" onclick="show('p-home')">&#8592;</button>
    <h1>New player</h1>
  </div>
  <div class="body">
    <div class="card">
      <label>Name</label>
      <input type="text" id="inp-name" placeholder="e.g. Arya" autocomplete="off">
      <label>Age</label>
      <input type="number" id="inp-age" placeholder="e.g. 7" min="3" max="18">
      <label>Pick a color</label>
      <div class="colors">
        <div class="dot sel" style="background:#EEEDFE" data-bg="#EEEDFE" data-fg="#3C3489" onclick="pickC(this)"></div>
        <div class="dot" style="background:#E1F5EE" data-bg="#E1F5EE" data-fg="#085041" onclick="pickC(this)"></div>
        <div class="dot" style="background:#FAEEDA" data-bg="#FAEEDA" data-fg="#633806" onclick="pickC(this)"></div>
        <div class="dot" style="background:#FCEBEB" data-bg="#FCEBEB" data-fg="#791F1F" onclick="pickC(this)"></div>
        <div class="dot" style="background:#E6F1FB" data-bg="#E6F1FB" data-fg="#0C447C" onclick="pickC(this)"></div>
        <div class="dot" style="background:#F4C0D1" data-bg="#F4C0D1" data-fg="#72243E" onclick="pickC(this)"></div>
      </div>
      <br>
      <button class="big go" onclick="addPlayer()">Create player</button>
    </div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="page" id="p-dash">
  <div class="bar">
    <button class="back" onclick="show('p-home')">&#8592;</button>
    <div id="d-av" class="av" style="width:34px;height:34px;font-size:13px;background:#EEEDFE;color:#3C3489">OO</div>
    <h1 id="d-name">Player</h1>
    <button class="back" onclick="delPlayer()" style="font-size:14px">🗑</button>
  </div>
  <div class="body">
    <div class="stat3">
      <div class="s3"><div class="s3v" id="s-done">0</div><div class="s3l">Practiced</div></div>
      <div class="s3"><div class="s3v" id="s-avg">—</div><div class="s3l">Avg score</div></div>
      <div class="s3"><div class="s3v" id="s-str">0</div><div class="s3l">🔥 Streak</div></div>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:13px;color:#888;margin-bottom:6px">
      <span>Progress</span><span id="s-pct">0%</span>
    </div>
    <div class="pbg"><div class="pfill" id="s-bar" style="width:0%"></div></div>
    <div class="tabs">
      <div class="tab on" id="tb-prac" onclick="switchTab('prac')">Practice</div>
      <div class="tab" id="tb-hist" onclick="switchTab('hist')">History</div>
    </div>
    <div id="tab-prac">
      <div class="chips">
        <div class="chip on" onclick="setF('all',this)">All 50</div>
        <div class="chip" onclick="setF('easy',this)">Easy</div>
        <div class="chip" onclick="setF('medium',this)">Medium</div>
        <div class="chip" onclick="setF('hard',this)">Hard</div>
      </div>
      <div id="tlist"></div>
    </div>
    <div id="tab-hist" style="display:none"><div id="hlist"></div></div>
  </div>
</div>

<!-- PRACTICE -->
<div class="page" id="p-prac">
  <div class="bar">
    <button class="back" onclick="leavePrac()">&#8592;</button>
    <h1>Practice</h1>
    <span class="badge" id="pr-badge" style="margin-left:auto">Easy</span>
    <span style="font-size:12px;color:rgba(255,255,255,.8);margin-left:8px" id="pr-num">#1</span>
  </div>
  <div class="body">
    <div class="card">
      <div class="ptext" id="pr-text"></div>
      <div class="ptip" id="pr-tip"></div>
    </div>
    <p class="secl">Step 1 — Listen</p>
    <div class="card">
      <div class="srow">
        <label>Speed</label>
        <input type="range" min="1" max="3" step="1" value="2" id="spd" oninput="setSpd(this.value)">
        <span id="spd-lbl">Normal</span>
      </div>
      <button class="big go" onclick="listenIt()">🔊 Listen</button>
    </div>
    <p class="secl">Step 2 — Record yourself</p>
    <div class="card">
      <div class="wave" id="wave">
        <span style="height:8px"></span><span style="height:14px"></span><span style="height:10px"></span>
        <span style="height:20px"></span><span style="height:12px"></span><span style="height:24px"></span>
        <span style="height:16px"></span><span style="height:10px"></span><span style="height:18px"></span>
        <span style="height:8px"></span><span style="height:14px"></span><span style="height:28px"></span>
      </div>
      <div>
        <button class="small" id="btn-rec" onclick="startRec()"><span class="rdot" id="rdot"></span>Record</button>
        <button class="small" id="btn-stop" style="display:none" onclick="stopRec()">⏹ Stop</button>
        <button class="small" id="btn-play" style="display:none" onclick="playRec()">▶️ Play back</button>
      </div>
    </div>
    <div id="ai-sec" style="display:none">
      <p class="secl">Step 3 — Get AI feedback</p>
      <div id="fbox" style="display:none" class="fbox"></div>
      <div>
        <button class="small" id="btn-ai" onclick="getAI()">✨ AI Feedback</button>
        <button class="small green" id="btn-done" onclick="markDone()">✅ Mark done</button>
      </div>
    </div>
    <br>
    <button class="big" onclick="nextT()">Next twister →</button>
  </div>
</div>

<script>
var TT=[
{t:"She sells seashells by the seashore.",p:"Focus on 's' vs 'sh' sounds.",l:"easy"},
{t:"Peter Piper picked a peck of pickled peppers.",p:"Great for the 'p' sound.",l:"easy"},
{t:"How much wood would a woodchuck chuck?",p:"Practice 'w' and 'ch' sounds.",l:"easy"},
{t:"Betty Botter bought some butter.",p:"Excellent for the 'b' sound.",l:"easy"},
{t:"I scream, you scream, we all scream for ice cream.",p:"Fun rhyming rhythm.",l:"easy"},
{t:"Red lorry, yellow lorry.",p:"Repeat 5x fast for best effect.",l:"easy"},
{t:"Toy boat. Toy boat. Toy boat.",p:"Sounds silly but trips up fast speakers.",l:"easy"},
{t:"Unique New York, unique New York.",p:"Trains the 'ny' and 'k' sounds.",l:"easy"},
{t:"A proper copper coffee pot.",p:"Practice 'p', 'c', 'f' clusters.",l:"easy"},
{t:"Six slippery snails slid slowly seaward.",p:"Great for 's' and 'sl' clusters.",l:"easy"},
{t:"Fuzzy Wuzzy was a bear.",p:"Fun 'w' and 'z' sound practice.",l:"easy"},
{t:"Zebras zig and zebras zag.",p:"Fun 'z' starter for young kids.",l:"easy"},
{t:"Rubber baby buggy bumpers.",p:"Classic 'b' and 'r' workout.",l:"medium"},
{t:"Black background, brown background.",p:"Tricky 'bl' and 'br' blends.",l:"medium"},
{t:"Fresh French fried fish.",p:"Master 'fr' and 'sh' together.",l:"medium"},
{t:"A big black bug bit a big black bear.",p:"Focus on 'b' and 'bl' alternation.",l:"medium"},
{t:"Can you can a can as a canner can can a can?",p:"Word-meaning shift with rhythm.",l:"medium"},
{t:"Lesser leather never weathered wetter weather better.",p:"Trains 'l', 'w', and 'th' sounds.",l:"medium"},
{t:"Selfish shellfish.",p:"Two-word twisters hit hard. Repeat 10x.",l:"medium"},
{t:"Three free throws.",p:"Great for 'thr' cluster articulation.",l:"medium"},
{t:"Fred fed Ted bread and Ted fed Fred bread.",p:"Reversal structure—focus on clarity.",l:"medium"},
{t:"The sixth sick sheik's sixth sheep's sick.",p:"'s', 'sh', 'x' all at once.",l:"medium"},
{t:"Which witch switched the Swiss wristwatches?",p:"Excellent 'w', 'sw', and 'ch' workout.",l:"medium"},
{t:"She sees cheese.",p:"Short but sneaky—say it 10x fast.",l:"medium"},
{t:"Blue bluebird, black blackbird.",p:"Challenges 'bl' + color pairs.",l:"medium"},
{t:"A skunk sat on a stump. The stump thunk the skunk stunk.",p:"'sk', 'st', 'th' consonant clusters.",l:"medium"},
{t:"Mix a box of mixed biscuits.",p:"Focus on 'ks' and 'x' endings.",l:"medium"},
{t:"If two witches watched two watches, which witch would watch which watch?",p:"Great for listening and tracking too.",l:"medium"},
{t:"Brisk brave brigadiers brandished broad bright blades.",p:"Advanced 'br' and 'bl' workout.",l:"hard"},
{t:"How can a clam cram in a clean cream can?",p:"'cl', 'cr', 'n' endings—rapid fire.",l:"hard"},
{t:"Nine nimble noblemen nibbled nuts.",p:"Trains 'n' and 'bl' across syllables.",l:"hard"},
{t:"He threw three free throws.",p:"Sounds easy—try it 5x fast.",l:"hard"},
{t:"I thought a thought, but the thought I thought wasn't the thought I thought I thought.",p:"'th' sound marathon.",l:"hard"},
{t:"The thirty-three thieves thought that they thrilled the throne throughout Thursday.",p:"Pure 'th' domination.",l:"hard"},
{t:"Swan swam over the sea, swim swan swim.",p:"'sw' + 'sw' rapid switching.",l:"hard"},
{t:"Truly rural, truly rural, truly rural.",p:"Two words. Impossible. Try it.",l:"hard"},
{t:"Whether the weather is warm or hot, we have to put up with the weather whether we like it or not.",p:"Long 'wh/w' sequence.",l:"hard"},
{t:"Seven slick slippery slimy snakes slowly sliding southward.",p:"Alliteration-heavy 's' and 'sl' drill.",l:"hard"},
{t:"A tutor who tooted a flute tried to tutor two tooters to toot.",p:"'t' and 'oo' vowel combinations.",l:"hard"},
{t:"The Irish wristwatch, the Swiss wristwatch.",p:"Consonant clusters that feel impossible.",l:"hard"},
{t:"Three grey geese in the green grass grazing.",p:"'gr', 'g', and long vowels together.",l:"hard"},
{t:"I wish to wash my Irish wristwatch.",p:"'w', 'sh', 'r' battle each other.",l:"hard"},
{t:"Crisp crusts crackle and crunch.",p:"Dense 'cr' clusters.",l:"hard"},
{t:"A noisy noise annoys an oyster.",p:"Tricky 'oy' and 'oi' vowel workout.",l:"hard"},
{t:"The bottom of the butter bucket is the buttered bucket bottom.",p:"'b', 'tt', 'ck' rhythm challenge.",l:"hard"},
{t:"I slit a sheet, a sheet I slit, upon the slitted sheet I sit.",p:"Fast 'sl', 'sh', 'st' switching.",l:"hard"},
{t:"How much ground would a groundhog hog if a groundhog could hog ground?",p:"Harder woodchuck variation.",l:"hard"},
{t:"If you notice this notice, you will notice that this notice is not worth noticing.",p:"Repeated words at speed.",l:"hard"},
{t:"Chester cheetah chews a chunk of cheap cheddar cheese.",p:"'ch' sound mastery drill.",l:"hard"},
{t:"Lesser leather never weathered wetter weather better.",p:"'l', 'w', 'th' across syllables.",l:"hard"}
];

// Safe storage
var _mem={};
function sGet(k){try{return localStorage.getItem(k)}catch(e){return _mem[k]||null}}
function sSet(k,v){try{localStorage.setItem(k,v)}catch(e){_mem[k]=v}}

var profiles=[];
try{profiles=JSON.parse(sGet('tt3')||'[]')}catch(e){profiles=[]}
var curP=null,curF='all',curT=0,mRec=null,aChunks=[],rBlob=null,rURL=null,wInt=null,spd=0.9;
var selBg='#EEEDFE',selFg='#3C3489';

function sv(){try{sSet('tt3',JSON.stringify(profiles))}catch(e){}}
function ini(n){return n.trim().split(/\s+/).map(function(w){return w[0]}).join('').toUpperCase().slice(0,2)||'??'}

function show(id){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('on')});
  document.getElementById(id).classList.add('on');
  window.scrollTo(0,0);
  if(id==='p-home')renderHome();
}

function renderHome(){
  var g=document.getElementById('pgrid');
  if(!profiles.length){g.innerHTML='<div class="empty">No players yet.<br>Tap Add player!</div>';return}
  g.innerHTML=profiles.map(function(p,i){
    var h=p.h||[],scores=h.filter(function(x){return x.s}).map(function(x){return x.s});
    var avg=scores.length?Math.round(scores.reduce(function(a,b){return a+b},0)/scores.length):null;
    return '<div class="pcard" onclick="openDash('+i+')">'+
      '<div class="av" style="background:'+p.bg+';color:'+p.fg+'">'+ini(p.name)+'</div>'+
      '<div class="pname">'+p.name+'</div>'+
      '<div class="page">Age '+p.age+'</div>'+
      '<div class="stats">'+
        '<div class="st"><div class="sv">'+(h.length)+'</div><div class="sl">done</div></div>'+
        '<div class="st"><div class="sv">'+(avg!==null?avg+'%':'—')+'</div><div class="sl">avg</div></div>'+
      '</div></div>';
  }).join('');
}

function pickC(el){
  document.querySelectorAll('.dot').forEach(function(d){d.classList.remove('sel')});
  el.classList.add('sel');
  selBg=el.dataset.bg;selFg=el.dataset.fg;
}

function addPlayer(){
  var name=document.getElementById('inp-name').value.trim();
  var age=parseInt(document.getElementById('inp-age').value)||7;
  if(!name){alert('Please enter a name');return}
  profiles.push({name:name,age:age,bg:selBg,fg:selFg,h:[],done:[]});
  sv();
  document.getElementById('inp-name').value='';
  document.getElementById('inp-age').value='';
  show('p-home');
}

function openDash(i){
  curP=i;curF='all';
  var p=profiles[i];
  document.getElementById('d-av').style.background=p.bg;
  document.getElementById('d-av').style.color=p.fg;
  document.getElementById('d-av').textContent=ini(p.name);
  document.getElementById('d-name').textContent=p.name;
  updStats();
  document.getElementById('tb-prac').classList.add('on');
  document.getElementById('tb-hist').classList.remove('on');
  document.getElementById('tab-prac').style.display='block';
  document.getElementById('tab-hist').style.display='none';
  document.querySelectorAll('.chip').forEach(function(c,i){c.classList.toggle('on',i===0)});
  renderList();
  show('p-dash');
}

function delPlayer(){
  if(!confirm('Remove '+profiles[curP].name+'?'))return;
  profiles.splice(curP,1);sv();show('p-home');
}

function updStats(){
  var p=profiles[curP],h=p.h||[];
  var scores=h.filter(function(x){return x.s}).map(function(x){return x.s});
  var avg=scores.length?Math.round(scores.reduce(function(a,b){return a+b},0)/scores.length):null;
  document.getElementById('s-done').textContent=h.length;
  document.getElementById('s-avg').textContent=avg!==null?avg+'%':'—';
  document.getElementById('s-str').textContent=streak(h);
  var pct=Math.round(((p.done||[]).length/TT.length)*100);
  document.getElementById('s-pct').textContent=pct+'%';
  document.getElementById('s-bar').style.width=pct+'%';
}

function streak(h){
  if(!h.length)return 0;
  var days=[...new Set(h.map(function(x){return new Date(x.ts).toDateString()}))];
  var s=0,d=new Date();
  for(var i=0;i<30;i++){if(days.includes(d.toDateString()))s++;else if(i>0)break;d.setDate(d.getDate()-1)}
  return s;
}

function switchTab(t){
  document.getElementById('tb-prac').classList.toggle('on',t==='prac');
  document.getElementById('tb-hist').classList.toggle('on',t==='hist');
  document.getElementById('tab-prac').style.display=t==='prac'?'block':'none';
  document.getElementById('tab-hist').style.display=t==='hist'?'block':'none';
  if(t==='hist')renderHist();
}

function setF(f,el){
  curF=f;
  document.querySelectorAll('.chip').forEach(function(c){c.classList.remove('on')});
  el.classList.add('on');
  renderList();
}

function renderList(){
  var p=profiles[curP],done=p.done||[];
  var list=TT.map(function(t,i){return Object.assign({},t,{i:i})}).filter(function(t){return curF==='all'||t.l===curF});
  document.getElementById('tlist').innerHTML=list.map(function(t){
    var d=done.includes(t.i);
    return '<div class="titem" onclick="openPrac('+t.i+')">'+
      '<div class="circle'+(d?' done':'')+'>'+(d?'✓':'')+'</div>'+
      '<div class="tinfo"><div class="tt">'+t.t+'</div><div class="tip">'+t.p+'</div></div>'+
      '<span class="badge '+t.l+'">'+t.l.charAt(0).toUpperCase()+t.l.slice(1)+'</span>'+
      '</div>';
  }).join('');
}

function renderHist(){
  var p=profiles[curP],h=(p.h||[]).slice().reverse().slice(0,30);
  if(!h.length){document.getElementById('hlist').innerHTML='<div class="empty">No sessions yet</div>';return}
  document.getElementById('hlist').innerHTML=h.map(function(x){
    var t=TT[x.i],d=new Date(x.ts);
    return '<div class="hitem">'+
      '<div class="hrow"><span class="badge '+t.l+'">'+t.l+'</span>'+
      (x.s?'<span class="spill" style="font-size:12px;padding:3px 10px">'+x.s+'%</span>':'')+
      '<span class="hdate">'+d.toLocaleDateString()+' '+d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})+'</span></div>'+
      '<div class="htext">'+t.t+'</div>'+
      (x.f?'<div class="hfeed">'+x.f+'</div>':'')+
      '</div>';
  }).join('');
}

function openPrac(i){
  curT=i;rBlob=null;rURL=null;
  document.getElementById('btn-play').style.display='none';
  document.getElementById('btn-stop').style.display='none';
  document.getElementById('ai-sec').style.display='none';
  document.getElementById('fbox').style.display='none';
  document.getElementById('btn-rec').style.display='inline-block';
  document.getElementById('rdot').classList.remove('rec');
  resetWave();
  var t=TT[i];
  document.getElementById('pr-text').textContent=t.t;
  document.getElementById('pr-tip').textContent='💡 '+t.p;
  document.getElementById('pr-num').textContent='#'+(i+1)+' / 50';
  var b=document.getElementById('pr-badge');
  b.textContent=t.l.charAt(0).toUpperCase()+t.l.slice(1);
  b.className='badge '+t.l;
  show('p-prac');
}

function leavePrac(){
  if(mRec&&mRec.state!=='inactive'){mRec.stop();mRec.stream.getTracks().forEach(function(t){t.stop()})}
  clearInterval(wInt);
  if(window.speechSynthesis)window.speechSynthesis.cancel();
  show('p-dash');updStats();renderList();
}

function setSpd(v){
  spd=[0.6,0.9,1.25][v-1];
  document.getElementById('spd-lbl').textContent=['Slow','Normal','Fast'][v-1];
}

function listenIt(){
  if(!window.speechSynthesis){alert('Text-to-speech not available');return}
  window.speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(TT[curT].t);u.rate=spd;
  window.speechSynthesis.speak(u);
}

function startRec(){
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){alert('Microphone not supported. Use Chrome.');return}
  navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
    aChunks=[];
    var mime=MediaRecorder.isTypeSupported('audio/webm')?'audio/webm':'audio/mp4';
    mRec=new MediaRecorder(stream,{mimeType:mime});
    mRec.ondataavailable=function(e){aChunks.push(e.data)};
    mRec.onstop=function(){
      rBlob=new Blob(aChunks,{type:mRec.mimeType});
      rURL=URL.createObjectURL(rBlob);
      document.getElementById('btn-play').style.display='inline-block';
      document.getElementById('ai-sec').style.display='block';
      stopWave();
    };
    mRec.start();
    document.getElementById('btn-rec').style.display='none';
    document.getElementById('btn-stop').style.display='inline-block';
    document.getElementById('rdot').classList.add('rec');
    startWave();
  }).catch(function(){alert('Microphone permission required. Allow access in browser settings.')});
}

function stopRec(){
  if(mRec&&mRec.state!=='inactive'){mRec.stop();mRec.stream.getTracks().forEach(function(t){t.stop()})}
  document.getElementById('btn-rec').style.display='inline-block';
  document.getElementById('btn-stop').style.display='none';
  document.getElementById('rdot').classList.remove('rec');
  stopWave();
}

function playRec(){if(rURL)new Audio(rURL).play()}

function startWave(){
  var bars=document.querySelectorAll('#wave span');
  wInt=setInterval(function(){bars.forEach(function(b){b.style.height=Math.round(6+Math.random()*28)+'px'})},100);
}
function stopWave(){clearInterval(wInt);resetWave()}
function resetWave(){
  var h=[8,14,10,20,12,24,16,10,18,8,14,28];
  document.querySelectorAll('#wave span').forEach(function(b,i){b.style.height=h[i]+'px'});
}

function getAI(){
  var t=TT[curT],p=profiles[curP];
  var btn=document.getElementById('btn-ai');
  btn.textContent='⏳ Thinking...';btn.disabled=true;
  var fb=document.getElementById('fbox');
  fb.style.display='block';fb.innerHTML='Getting AI coaching...';
  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',max_tokens:1000,
      messages:[{role:'user',content:'A '+p.age+'-year-old child just practiced this tongue twister: "'+t.t+'"\n\nTip: '+t.p+'\nDifficulty: '+t.l+'\n\nGive short encouraging coaching. Include:\n1. One motivating sentence\n2. Key sounds to focus on\n3. One improvement tip\n4. A score out of 100 (format: SCORE:XX)\n\nMax 80 words. Fun and age-appropriate for age '+p.age+'.'}]
    })
  }).then(function(r){return r.json()}).then(function(d){
    var text=d.content.map(function(c){return c.text||''}).join('');
    var m=text.match(/SCORE:(\d+)/),score=m?parseInt(m[1]):null;
    var clean=text.replace(/SCORE:\d+/,'').trim();
    fb.innerHTML=clean+(score!==null?'<br><span class="spill">'+score+' / 100</span>':'');
    if(!p.h)p.h=[];
    p.h.push({i:curT,ts:Date.now(),s:score,f:clean});
    sv();updStats();
  }).catch(function(){
    fb.innerHTML='<span style="color:#E24B4A">Could not reach AI. Check internet.</span>';
  }).finally(function(){btn.textContent='✨ AI Feedback';btn.disabled=false});
}

function markDone(){
  var p=profiles[curP];
  if(!p.done)p.done=[];
  if(!p.done.includes(curT))p.done.push(curT);
  if(!p.h)p.h=[];
  var recent=p.h.find(function(x){return x.i===curT&&Date.now()-x.ts<10000});
  if(!recent)p.h.push({i:curT,ts:Date.now()});
  sv();nextT();
}

function nextT(){openPrac((curT+1)%TT.length)}

if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(function(){})}

renderHome();
</script>
</body>
</html>
